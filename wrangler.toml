# wrangler.toml
name = 'bridge-os-worker'
main = "index.js"
compatibility_date = "2024-03-07"

# DedupeObject を完全に削除するための命令
[[migrations]]
tag = "v2"
deleted_classes = ["DedupeObject"]
[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1


# Non-secret runtime vars
[vars]
# Set to your GAS Web App URL in each environment (example value only)
GAS_WEBHOOK_URL = ""
