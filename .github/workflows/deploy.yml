name: BRIDGE OS AUTO-DEPLOY

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: setup-node@v4
        with:
          node-version: '20'

      - name: Install Clasp
        run: npm install -g @google/clasp

      - name: Create clasp auth file
        # 認証ファイルを生成
        run: echo "${{ secrets.CLASPRC_JSON }}" > ~/.clasprc.json

      - name: Force create .clasp.json from Secret
        # リポジトリのファイルは無視して、Secretから設定ファイルを強制生成します
        run: |
          echo '{"scriptId":"${{ secrets.SCRIPT_ID }}","rootDir":"./"}' > .clasp.json

      - name: Deploy to GAS
        # 強制的にプッシュを実行
        run: clasp push -f
