name: BRIDGE OS AUTO-DEPLOY
on: [push]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Clasp
        run: npm install -g @google/clasp

      - name: Create Auth and Config Files
        env:
          CLASPRC: ${{ secrets.CLASPRC_JSON }}
        run: |
          # 1. 鍵（JSON）を一切の加工なしで流し込む
          cat << 'EOF' > ~/.clasprc.json
          ${{ secrets.CLASPRC_JSON }}
          EOF
          
          # 2. IDを物理的に書き込む（Secretを介さないことで、読み取りミスを0にします）
          echo '{"scriptId":"1_5QLn1m22GmUOfKRWB54DKXqQZT2nduQjoUPUDnXIUQB0kVBEh-_GHZ","rootDir":"."}' > .clasp.json

      - name: Force Deploy
        run: |
          # 3. 強制的にプッシュを実行
          clasp push -f
