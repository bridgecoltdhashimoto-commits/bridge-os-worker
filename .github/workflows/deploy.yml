name: BRIDGE OS AUTO-DEPLOY
on: [push]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g @google/clasp
      - run: |
          # 1. 鍵を流し込む
          cat << 'EOF' > ~/.clasprc.json
          ${{ secrets.CLASPRC_JSON }}
          EOF
          
          # 2. IDを物理的に固定（Secretを使わないことで、読み込みミスを100%防ぎます）
          echo '{"scriptId":"1_5QLn1m22GmUOfKRWB54DKXqQZT2nduQjoUPUDnXIUQB0kVBEh-_GHZ","rootDir":"./"}' > .clasp.json
          
          # 3. 送信
          clasp push -f
