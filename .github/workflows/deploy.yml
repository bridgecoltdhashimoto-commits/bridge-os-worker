name: BRIDGE OS AUTO-DEPLOY
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Clasp
        run: npm install -g @google/clasp
      - name: Create files from Secrets
        env:
          CLASPRC: ${{ secrets.CLASPRC_JSON }}
          SCRIPT_ID: ${{ secrets.SCRIPT_ID }}
        run: |
          echo "$CLASPRC" > ~/.clasprc.json
          echo "{\"scriptId\":\"$SCRIPT_ID\",\"rootDir\":\"./\"}" > .clasp.json
      - name: Deploy to GAS
        run: clasp push -f
