name: BRIDGE OS AUTO-DEPLOY
on: [push]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Clasp
        run: npm install -g @google/clasp

      - name: Create Auth and Config Files
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
          GAS_SCRIPT_ID: ${{ secrets.GAS_SCRIPT_ID }}
        run: |
          # 1. 鍵（JSON）を一切の加工なしで流し込む
          cat << 'EOF' > ~/.clasprc.json
          ${{ secrets.CLASPRC_JSON }}
          EOF

          # 2. 必須Secretの存在確認（値は表示しない）
          test -n "$CLASPRC_JSON" || { echo "Missing secret: CLASPRC_JSON"; exit 1; }
          test -n "$GAS_SCRIPT_ID" || { echo "Missing secret: GAS_SCRIPT_ID"; exit 1; }

          # 3. GAS Script IDをSecretから設定
          printf '{"scriptId":"%s","rootDir":"."}\n' "$GAS_SCRIPT_ID" > .clasp.json

      - name: Force Deploy
        run: |
          # 4. 強制的にプッシュを実行
          clasp push -f
