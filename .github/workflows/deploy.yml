name: BRIDGE OS AUTO-DEPLOY
on: [push]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g @google/clasp
      - env:
          CLASPRC: ${{ secrets.CLASPRC_JSON }}
          ID: ${{ secrets.SCRIPT_ID }}
        run: |
          # 1. 認証情報の改行コードを正常化
          echo "$CLASPRC" | tr -d '\r' > ~/.clasprc.json
          
          # 2. IDから空白・改行を完全に除去（これがエラーの主因です）
          CLEAN_ID=$(echo "$ID" | tr -d '[:space:]')
          echo "{\"scriptId\":\"$CLEAN_ID\",\"rootDir\":\"./\"}" > .clasp.json
          
          # 3. 邪魔な設定ファイルを無視して強制プッシュ
          rm -f .claspignore
          clasp push -f
