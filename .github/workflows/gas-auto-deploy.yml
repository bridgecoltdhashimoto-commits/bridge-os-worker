name: GAS Auto Deploy Guarded

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "main.gs"
      - "gas-deploy/**"
      - ".github/workflows/gas-auto-deploy.yml"

permissions:
  contents: read

jobs:
  gas-auto-deploy:
    name: Push GAS code only
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GAS_SCRIPT_ID: ${{ secrets.GAS_SCRIPT_ID }}
      CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
      BRIDGE_NOTIFY_WEBHOOK_URL: ${{ secrets.BRIDGE_NOTIFY_WEBHOOK_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          set -eu
          if [ -z "${GAS_SCRIPT_ID}" ]; then
            echo "GAS_SCRIPT_ID secret is required."
            exit 1
          fi
          if [ -z "${CLASPRC_JSON}" ]; then
            echo "CLASPRC_JSON secret is required."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Prepare clasp credentials
        run: |
          set -eu
          mkdir -p "$HOME"
          printf '%s' "${CLASPRC_JSON}" > "$HOME/.clasprc.json"
          test -s "$HOME/.clasprc.json"

      - name: Prepare GAS push directory
        run: |
          set -eu
          rm -rf .gas-push
          mkdir -p .gas-push
          cp main.gs .gas-push/main.gs
          cp gas-deploy/appsscript.json .gas-push/appsscript.json
          printf '{"scriptId":"%s","rootDir":"."}\n' "${GAS_SCRIPT_ID}" > .gas-push/.clasp.json
          ls -la .gas-push

      - name: Static check
        run: |
          set -eu
          cp main.gs /tmp/main_check.js
          node --check /tmp/main_check.js

      - name: Push code to Apps Script HEAD only
        run: |
          set -eu
          cd .gas-push
          npx --yes @google/clasp@latest push --force

      - name: Write smartphone summary
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## BRIDGE OS GAS自動反映 結果

          - 結果: ${{ job.status }}
          - GAS反映: 実行
          - Webアプリデプロイ更新: false
          - Smoke test: false
          - Commit: ${GITHUB_SHA}

          このworkflowはApps Scriptのコード反映だけを行います。公開中Webアプリのデプロイ更新はApps Script画面で手動確認してから実行してください。
          EOF

      - name: Optional external notification
        if: always() && env.BRIDGE_NOTIFY_WEBHOOK_URL != ''
        run: |
          set -eu
          STATUS="${{ job.status }}"
          PAYLOAD=$(node -e "console.log(JSON.stringify({system:'BRIDGE OS', workflow:'GAS Auto Deploy Guarded', status: process.env.STATUS, deploy_webapp: false, repository: process.env.GITHUB_REPOSITORY, commit: process.env.GITHUB_SHA, run_url: process.env.GITHUB_SERVER_URL + '/' + process.env.GITHUB_REPOSITORY + '/actions/runs/' + process.env.GITHUB_RUN_ID}))")
          curl -fsS -X POST "${BRIDGE_NOTIFY_WEBHOOK_URL}" -H "Content-Type: application/json" --data "${PAYLOAD}"
